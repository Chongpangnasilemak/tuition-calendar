<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Tuition Calendar</title>
    <meta
      name="description"
      content="A scheduling calendar for a private tutor and parents. Parents see their child's lessons and the tutor's anonymous availability, and can request reschedules or extra lessons."
    />
    <link rel="stylesheet" href="./css/app.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>"
    />
  </head>
  <body>
    <div id="mode-banner" class="banner" role="status" aria-live="polite"></div>
    <header id="app-header" class="topbar-wrap"></header>
    <main id="app" class="app"></main>
    <noscript>
      <p style="padding: 2rem; text-align: center">
        This app needs JavaScript enabled.
      </p>
    </noscript>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
